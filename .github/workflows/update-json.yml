name: Update Cybersecurity JSON
on:
  schedule:
    - cron: '0 9 * * 1' # Monday 9 AM UTC
  workflow_dispatch:
jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.x'
    - run: |
        python -m pip install --upgrade pip
        pip install feedparser requests python-dateutil pytz
    - run: python cybersecurity_dashboard.py
    - run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        git add cybersecurity_data.json cache.json
        git commit -m "Update cybersecurity JSON" || echo "No changes"
        git push